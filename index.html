<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonJTech</title>
  <meta name="description" content="MoonJTech — something big is coming.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      width: min(420px, 78vw);
      height: auto;
      opacity: 0;
      animation: rise 0.9s ease-out 0.1s forwards;
    }

    .tagline {
      margin-top: 34px;
      color: #1e3461;
      font-size: clamp(18px, 4.2vw, 26px);
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: rise 0.9s ease-out 0.45s forwards;
    }

    .dots span {
      display: inline-block;
      color: #ffc20e;
      animation: blink 1.6s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.25s; }
    .dots span:nth-child(3) { animation-delay: 0.5s; }

    .footer {
      position: fixed;
      bottom: 22px;
      color: #9aa3b2;
      font-size: 12.5px;
      letter-spacing: 0.03em;
      opacity: 0;
      animation: rise 0.9s ease-out 0.8s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.15; }
      30%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .tagline, .footer { animation: none; opacity: 1; }
      .dots span { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo.png" alt="MoonJTech">
  <p class="tagline">Something big is coming<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
  <p class="footer">&copy; 2026 MoonJTech</p>
</body>
</html>
